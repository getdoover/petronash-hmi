name: Test, Lint & Deploy Docker Image

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Push image on failed test or linting (not recommended!)?'
        required: true
        type: boolean

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint Code
    uses: ./.github/workflows/run-linting.yml
    secrets: inherit

  test:
    name: Test Code
    uses: ./.github/workflows/run-tests.yml
    secrets: inherit

  validate:
    name: Validate Schemas
    uses: ./.github/workflows/validate-schema.yml
    secrets: inherit

  smoke_test:
    name: Smoke Test (container runs)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image and load it locally (amd64). This catches dependencies
      # that fail to *install* (e.g. no musllinux wheel on the alpine base).
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          load: true
          tags: smoke:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Importing the app package exercises the whole dependency graph (pydoover
      # and everything resolved from the base). This catches deps that install
      # but fail to *import* at runtime - which the app's unit tests can't, since
      # they don't run inside the built container. Module name is derived from the
      # doover-app-run entry point so this step is identical across all apps.
      - name: Import app package inside the container
        run: |
          MODULE=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['scripts']['doover-app-run'].split(':')[0])")
          echo "Importing '$MODULE' inside the container..."
          docker run --rm --entrypoint python smoke:latest -c "import $MODULE; print('container import OK')"

  push_to_registries:
    name: Push Docker Image
    needs: [lint, test, validate, smoke_test]
    if: ${{ github.event_name != 'pull_request' && ((needs.test.result == 'success' && needs.validate.result == 'success' && needs.smoke_test.result == 'success') || (github.event_name == 'workflow_dispatch' &&  github.event.inputs.confirmation == 'true')) }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Push Images
        id: push
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          platforms: linux/arm64,linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (key-pair, offline-verifiable)
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.DOOVER_PUBLIC_COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ""
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          # Sign by digest (covers every tag pointing at this manifest) with
          # the tlog upload disabled so the app controller can verify fully
          # offline on edge devices.
          cosign sign --yes --tlog-upload=false --registry-referrers-mode oci-1-1 \
            --key env://COSIGN_PRIVATE_KEY \
            "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"
