<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA Remote Command</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/hmi-core.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>
                <img src="{{ url_for('static', filename='petronash_logo.png') }}" alt="Petronash" class="title-logo title-logo-left">
                <img src="{{ url_for('static', filename='remote_command_logo.png') }}" alt="SIA Remote Command" class="header-logo"> SIA Remote Command
                <img src="{{ url_for('static', filename='aramco_logo.png') }}" alt="Aramco" class="title-logo title-logo-right">
            </h1>
            <div class="header-info">
                <div class="connection-status">
                    <span id="connection-status" class="status-disconnected">
                        <i class="fas fa-circle"></i> Disconnected
                    </span>
                </div>
                <div class="timestamp">
                    Last Update: <span id="last-update">--</span>
                </div>
            </div>
        </header>

        <main class="dashboard-content">
            <!-- The shared render core (static/js/hmi-core.js) builds the whole HMI in here -->
            <div id="hmi-root"></div>
        </main>
    </div>

    <!-- Loading overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Connecting to dashboard...</p>
        </div>
    </div>

    <!-- Footer Logo -->
    <div class="footer-logo">
        <img src="{{ url_for('static', filename='Doover Logo - Landscape - Frost White.svg') }}" alt="Doover Logo">
    </div>

    {% if dev_mode %}
    <!-- Dev-only toolbar: inject v2 fixture data / toggle the two alert flags -->
    <div id="dev-toolbar" class="dev-toolbar">
        <span class="dev-toolbar-label"><i class="fas fa-flask"></i> Dev</span>
        <button type="button" class="dev-btn" data-dev="fixture">Fixture Data</button>
        <button type="button" class="dev-btn" data-dev="nulls">Null Data</button>
        <button type="button" class="dev-btn" data-dev="toggle-unexpected">Unexpected Flow</button>
        <button type="button" class="dev-btn" data-dev="toggle-low">Low Flow</button>
        <button type="button" class="dev-btn dev-btn-clear" data-dev="clear">Clear</button>
    </div>
    {% endif %}

    <!-- Scripts: socket.io is a classic script (global `io`); the shell is an ES module -->
    <script src="{{ url_for('static', filename='js/socket.io.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
